    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 selection:bg-sky-500/30">

    <!-- ==========================================
         PORTFOLIO CONFIGURATION - EDIT HERE
         ========================================== -->

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-xl font-bold bg-gradient-to-r from-sky-400 to-blue-500 bg-clip-text text-transparent cursor-pointer" onclick="navigateTo('home')">
                SACHIN.
            </div>
            <div class="flex gap-8 text-sm font-medium text-slate-400">
                <button onclick="navigateTo('home')" class="nav-link capitalize hover:text-sky-400 transition-colors">home</button>
                <button onclick="navigateTo('projects')" class="nav-link capitalize hover:text-sky-400 transition-colors">projects</button>
                <button onclick="navigateTo('about')" class="nav-link capitalize hover:text-sky-400 transition-colors">about</button>
                <button onclick="navigateTo('contact')" class="nav-link capitalize hover:text-sky-400 transition-colors">contact</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="app-content" class="min-h-screen pt-16">
        <!-- Content injected by JavaScript -->
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-800 text-center text-slate-500 text-sm">
        <p id="footer-copy"></p>
        <p class="mt-2">Built with HTML, Tailwind CSS & JS</p>
    </footer>

    <script>
        // --- Router Logic ---
        function navigateTo(page, projectId = null) {
            const content = document.getElementById('app-content');
            content.innerHTML = ''; // Clear current content
            window.scrollTo(0, 0);

            if (page === 'home') renderHome();
            else if (page === 'projects') renderProjects();
            else if (page === 'about') renderAbout();
            else if (page === 'contact') renderContact();
            else if (page === 'project-detail') renderProjectDetail(projectId);

            // Update Nav Active State
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('text-sky-400', link.innerText.toLowerCase() === page);
            });
            
            // Re-initialize icons
            lucide.createIcons();
        }

        // --- Render Functions ---

        function renderHome() {
            const app = document.getElementById('app-content');
            app.innerHTML = `
                <div class="fade-in">
                    <section class="pt-32 pb-20 px-6 max-w-6xl mx-auto text-center">
                        <div class="inline-block px-4 py-1.5 mb-6 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-sm font-medium">
                            Available for new opportunities
                        </div>
                        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight text-white">
                            Hi, I'm <span class="text-sky-400">${PORTFOLIO_DATA.profile.name.split(' ')[0]}</span>
                        </h1>
                        <p class="text-xl text-slate-400 max-w-2xl mx-auto mb-10">
                            ${PORTFOLIO_DATA.profile.bio}
                        </p>
                        <div class="flex justify-center gap-4">
                            <button onclick="navigateTo('projects')" class="px-8 py-3 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-full transition-all shadow-lg shadow-sky-500/25">View My Work</button>
                            <button onclick="navigateTo('contact')" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-full border border-slate-700 transition-all">Get In Touch</button>
                        </div>
                    </section>

                    <section class="py-20 px-6 max-w-6xl mx-auto">
                        <div class="flex justify-between items-end mb-12">
                            <div>
                                <h2 class="text-3xl font-bold text-white mb-2">Featured Projects</h2>
                                <p class="text-slate-400">Favorite things I've built recently.</p>
                            </div>
                            <button onclick="navigateTo('projects')" class="hidden md:flex items-center text-sky-400 font-semibold hover:underline">
                                View All Projects <i data-lucide="chevron-right" class="ml-1"></i>
                            </button>
                        </div>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${PORTFOLIO_DATA.projects.slice(0, 3).map(p => createProjectCard(p)).join('')}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderProjects() {
            const app = document.getElementById('app-content');
            app.innerHTML = `
                <section class="pt-24 pb-20 px-6 max-w-6xl mx-auto fade-in">
                    <h2 class="text-4xl font-bold text-white mb-4 text-center">My Projects</h2>
                    <p class="text-slate-400 text-center mb-16 max-w-xl mx-auto">A complete list of my technical and creative experiments.</p>
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${PORTFOLIO_DATA.projects.map(p => createProjectCard(p)).join('')}
                    </div>
                </section>
            `;
        }

        function renderProjectDetail(id) {
            const project = PORTFOLIO_DATA.projects.find(p => p.id === id);
            const app = document.getElementById('app-content');
            app.innerHTML = `
                <div class="pt-12 pb-20 px-6 max-w-4xl mx-auto fade-in">
                    <button onclick="navigateTo('projects')" class="flex items-center text-slate-400 hover:text-white mb-8 transition-colors">
                        <i data-lucide="arrow-left" class="mr-2"></i> Back to projects
                    </button>
                    <div class="rounded-3xl overflow-hidden mb-10 shadow-2xl">
                        <img src="${project.image}" class="w-full h-auto max-h-[500px] object-cover" />
                    </div>
                    <div class="grid md:grid-cols-3 gap-10">
                        <div class="md:col-span-2">
                            <h1 class="text-4xl font-bold text-slate-100 mb-4">${project.title}</h1>
                            <div class="flex flex-wrap gap-2 mb-6">
                                ${project.tech.map(t => `<span class="px-3 py-1 bg-slate-800 rounded-full text-xs text-slate-300 border border-slate-700">${t}</span>`).join('')}
                            </div>
                            <p class="text-slate-300 leading-relaxed text-lg">${project.fullDesc}</p>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                                <h4 class="text-slate-100 font-bold mb-4">Project Links</h4>
                                <div class="space-y-3">
                                    <a href="${project.liveUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-between p-3 bg-sky-500 hover:bg-sky-400 text-white rounded-xl transition-colors">
                                        <span>Live Preview</span> <i data-lucide="external-link" size="18"></i>
                                    </a>
                                    <a href="${project.githubUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-between p-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl transition-colors">
                                        <span>View Code</span> <i data-lucide="github" size="18"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAbout() {
            const app = document.getElementById('app-content');
            app.innerHTML = `
                <section class="pt-24 pb-20 px-6 max-w-4xl mx-auto fade-in">
                    <div class="grid md:grid-cols-3 gap-12 items-start">
                        <div class="aspect-square rounded-2xl overflow-hidden border-2 border-slate-800 bg-slate-800">
                            <img src="${PORTFOLIO_DATA.profile.image}" alt="Profile" class="w-full h-full object-cover">
                            </div>
                        <div class="md:col-span-2">
                            <h2 class="text-4xl font-bold text-white mb-6">About Me</h2>
                            <div class="space-y-4 text-slate-300 text-lg">
                                <p>I am a passionate creator based in ${PORTFOLIO_DATA.profile.location}. My journey started with a fascination for Microcontrollers and IoT.</p>
                                <p>I spend my time balancing between building web applications and implementing embedded solutions.</p>
                                <div class="pt-6">
                                    <h4 class="text-white font-bold mb-4">Core Skills</h4>
                                    <div class="flex flex-wrap gap-2">
                                        ${PORTFOLIO_DATA.skills.map(s => `<span class="px-4 py-2 bg-slate-800 rounded-xl text-sky-400 text-sm font-medium border border-slate-700">${s}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderContact() {
            const app = document.getElementById('app-content');
            app.innerHTML = `
                <section class="pt-24 pb-20 px-6 max-w-2xl mx-auto fade-in text-center">
                    <h2 class="text-4xl font-bold text-white mb-4">Let's Talk</h2>
                    <p class="text-slate-400 mb-12">Interested in collaborating or just want to say hi?</p>
                    <div class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-xl text-left">
                        <div class="grid gap-6">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Full Name</label>
                                <input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 text-white" placeholder="John Doe">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Email Address</label>
                                <input type="email" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 text-white" placeholder="john@example.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Message</label>
                                <textarea rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-sky-500 text-white" placeholder="Tell me about your project..."></textarea>
                            </div>
                            <button class="flex items-center justify-center gap-2 w-full py-4 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl transition-all">
                                <i data-lucide="send" size="18"></i> Send Message
                            </button>
                        </div>
                    </div>
                </section>
            `;
        }

        // --- Helper: Create Project Card HTML ---
        function createProjectCard(project) {
            return `
                <div onclick="navigateTo('project-detail', '${project.id}')" class="group relative bg-slate-800 rounded-2xl overflow-hidden border border-slate-700 hover:border-sky-500/50 transition-all duration-300 cursor-pointer hover:-translate-y-2 shadow-xl">
                    <div class="h-48 overflow-hidden">
                        <img src="${project.image}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                    </div>
                    <div class="p-6">
                        <span class="text-xs font-bold text-sky-400 uppercase tracking-widest">${project.category}</span>
                        <h3 class="text-xl font-bold mt-2 text-slate-100">${project.title}</h3>
                        <p class="text-slate-400 mt-2 text-sm line-clamp-2">${project.shortDesc}</p>
                        <div class="flex items-center mt-4 text-sky-400 text-sm font-semibold">
                            View Project <i data-lucide="chevron-right" class="ml-1 group-hover:translate-x-1 transition-transform"></i>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Initialization ---
        window.onload = () => {
            document.getElementById('footer-copy').innerText = `© ${new Date().getFullYear()} ${PORTFOLIO_DATA.profile.name}. All rights reserved.`;
            navigateTo('home');
        };
    </script>
</body>
</html>
